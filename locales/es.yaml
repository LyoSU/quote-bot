  long: |
    ¡Crea impresionantes stickers de citas y preserva tus momentos favoritos del chat! ✨

    Simplemente responde /q a cualquier mensaje o reenvíamelo. Perfecto para guardar:
    🌟 Los mejores momentos y recuerdos del chat
