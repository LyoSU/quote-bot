description:
  short: |
    Я помогу создать цитату из сообщения.
    Просто ответьте на сообщение с помощью /q или отправьте его мне.
  long: |
    Заметили какие-нибудь забавные или вдохновляющие сообщения в групповом чате, которые хотели бы увековечить? Просто перешлите их мне или введите /q, и я превращу их в стильную наклейку с цитатами, которую вы сможете сохранить и поделиться с друзьями. Будь то для личных воспоминаний или профессионального использования, возможности безграничны. Попробуйте меня прямо сейчас! 😎
help: |2
  <b>Привет!</b>
  Я помогу создать цитату из поста.
  Бот может работать как в личных сообщениях, так и в группах.

    <b>⚙️ Доступные команды:</b>
  /q — сделать цитату из сообщения <i>[ответить на сообщение]</i>

  Чтобы создать цитату из нескольких сообщений, напишите в качестве параметра число, которое будет указывать, сколько сообщений должно быть в цитате.
  В личных сообщениях вы можете переслать мне сразу несколько сообщений и я сделаю из них цитату.

    <b>Доступные флаги для команды /q:</b>
      hex код или название цвета: <code>#cbafff</code> или <code>indigo</code> — сделает цитату с цветом <b>#cbafff</b>
      <code>random</code> — случайный цвет цитаты
      <code>reply</code> или <code>r</code> — сделать цитату с сохранением ответов
      <code>p</code> или <code>png</code> — сделать цитату PNG
      <code>i</code> или <code>img</code> — сделать цитату картинкой
      <code>rate</code> — добавить оценку цитат
      <code>m</code> или <code>media</code> — включить медиа
      <code>c</code> или <code>crop</code> — обрезать медиа
      <code>s2.5</code> — качество изображения в 2,5 раза выше стандартного <i>(можно задать любое значение)</i>

    <b>Пример использования флагов:</b>
    <code>/q 3 white rp</code>
    <code>/q i red s3.2</code>
    <code>/q r 2 #cbafff m</code>
    <code>/q 5 rm</code>

  Только для администраторов:
  <code>/qs 🥰💜</code> — сохраняет стикер/фото/документ с фотографией в стикерпак группы с эмодзи 🥰💜 <i>(любое количество эмодзи)</i> <i>[ответить на сообщение]</i>
  <code>/qd</code> — удалить стикер из стикерпака группы <i>[в ответ на сообщение]</i>
  <code>/qdrand</code> — remove the sticker from the group random stickers  <i>[in response to the message]</i>
  <code>/qb</code> — установить бренд эмодзи. Доступно: <code>apple</code>, <code>google</code>, <code>twitter</code>, <code>joypixels</code>, <code>blob</code>
  <code>/qcolor green</code> — установить цвет цитат <b>зеленый</b> по умолчанию <i>(hex код или название цвета)</i>
  <code>/qemoji</code> — изменить суффикс эмодзи для стикеров
  <code>/qrate</code> — включить/отключить рейтинг цитат
  <code>/qgab 300</code> — установить шанс случайного появление цитата. Любое число от одного от бесконечноести. Чем выше число, тем ниже шанс появления цитат. Указав 300, шанс появления сообщение будет примерно 1 раз в 300 сообщений. Чтобы отключить, установите значение на 0

  /qrand — случайная цитата с положительным рейтингом
  /qtop — лучшие цитаты группы

  /help или /start — получить этот текст

  🇺🇸 /lang — изменить язык
  🇷🇺 /lang — изменить язык

