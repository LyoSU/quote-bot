        <b>Показать ответ:</b>
        <code>/q r</code> — включает сообщение-ответ

        <b>HD-качество:</b>
        <code>/q s3.2</code> — выше разрешение

        <b>Комбинируйте:</b>
        <code>/q m r red</code> — медиа + ответ + цвет
    group:
      title: |
        <b>👥 Функции для групп</b>

        <b>Оценка цитат:</b>
        👍👎 кнопки на цитатах
        Включить: <code>/qrate</code>

        <b>Топ цитат:</b>
        <code>/qtop</code> — лучшие цитаты

        <b>Случайная цитата:</b>
        <code>/qrand</code> — случайная из лучших

        <b>Набор стикеров группы:</b>
        <code>/qs 💜</code> — сохранить в набор
        <code>/qd</code> — удалить из набора
