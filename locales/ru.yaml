      Номер — это число пользователей, которые потенциально будут видеть ваше объявление на этом языке.
      Засчитываются только пользователи, которые используют бота. Но объявление можно увидеть также другими пользователями, которые находятся в группе, где была сделана цитата. таким образом эта цифра может быть выше

