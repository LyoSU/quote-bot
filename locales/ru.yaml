adv:
  about: |
    <b>💫 Вы можете купить рекламу у нас для большого числа активных пользователей и групп</b>

    • Наш бот состоит из более чем 30`000 активных групп, и каждый месяц более 70`000 пользователей используют бота.
    Среди них пользователи из различных стран. Вы можете выбрать язык пользователей, для которых будет отображаться объявление
    • Реклама отображается под котировкой в виде кнопки или текстового сообщения, в зависимости от пользовательского чата
    • Вы сами укажете цену рекламы; в первую очередь, отображается объявление, для которого была назначена наибольшая сумма,
    • Текст и содержание объявления должны соответствовать нашим правилам (/adv_rules) и перед публикацией вы должны пройти модерацию. Это может быть сделано перед внесением депозита

    баланса: ${balance} USD
  rules: |
    <b>В рекламе <u>запрещено</u></b>
    • Использование нецензурной лексики или оскорблений
    • Использование более 1 смайлика в тексте
    • Информация, вводящая в заблуждение
    • Информация, запрещенная законодательством Украины
    • Контент для взрослых
    • Азартные игры

    <i>Мы также имеем право отклонить рекламу, если она нам просто не нравится без причины.</i>
  main_menu:
