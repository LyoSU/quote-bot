    Lütfen bir dakika sonra tekrar deneyin!
  empty_forward: |
    Lütfen alıntılamak istediğiniz mesaja yanıt verin veya onu iletin ✨
  set_background_color: |
    <b>Mükemmel!</b> Alıntı arka planı değiştirildi: <code>${backgroundColor}</code> 🎨
  set_emoji_brand: |
    <b>Tamam!</b> Emoji stili değiştirildi: <code>${emojiBrand}</code> ✨
