      api_error: |
        ❌ Matn tanib olish xatosi. Iltimos, yana urinib ko'ring.
      rate_limit: |
        ⏳ Juda ko'p so'rovlar! Iltimos, yana urinib ko'rishdan oldin ${seconds} soniya kuting.
