---
language_name: '🇺🇿 O''zbek'
description:
  short: |
    Har qanday xabarni chiroyli sitata stikeriga aylantiring! ✨
    /q buyrug'i bilan javob bering yoki xabarni menga yuboring
  long: |
    Ajoyib sitata stikeri yaratng va sevimli suhbat vaqtlari saqlang! ✨

    Faqat /q ga har qanday xabar bilan javob bering yoki uni menga yuboring. Saqlash uchun ideal:
    🌟 Eng yaxshi suhbat xotiralari
    💭 Ilhomlantiruvchi fikrlar va suhbatlar
    🎨 Custom uslublardagi ijodiy xabarlar
    ✍️ Muhim eslatmalar go'zal formatda

    Darhol boshlang - xabarni yuboring yoki /q dan foydalaning!
start: |
  <b>Salom! 👋 Men QuotLyBotman</b>

  Oddiy chat xabarlarini ajoyib iqtibos stikerlariga aylantiraman. Oddiy, ijodkor va foydalanish uchun qiziqarli!

  ✨ <b>Birinchi iqtibosingizni yaratishga tayyormisiz?</b>
  <b>Xususiy suhbatlarda:</b> Har qanday xabarni menga yo'naltiring (hatto bir nechta bir vaqtning o'zida tanlang!)
  <b>Guruhlarda:</b> Meni guruhingizga qo'shing va istalgan xabarga <code>/q</code> bilan javob bering

  Ranglar, uslublar va boshqalarni o'zgartirmoqchimisiz? Barcha ijodiy imkoniyatlarni kashf qilishga tayyor bo'lganda /help yozing! 🎨
help: |
  <b>✨ QuotLyBot: Tez va Oson Iqtiboslar! ✨</b>

  Telegramda xabarlarni uslubiy iqtiboslarga aylantiring. Mana qanday:

  📱 <b>Asosiy Iqtiboslash</b>

  • Javob va Iqtibos: Xabarga javob bering va <code>/q</code> yozib uni iqtiboslang.
  • Bir nechta iqtiboslang: Bir nechta xabarlarning birinchisiga javob bering, <code>/q [son]</code> (masalan, <code>/q 3</code>) yozib bir nechta iqtiboslang.
  • Yuborish va Iqtiboslash: Xabarni to'g'ridan-to'g'ri iqtiboslash uchun botga yuboring.

  🎨 <b>Iqtibosingizni Moslashtiring</b>

  • Ranglar:
      • Asosiy: <code>/q red</code> (yoki blue, green va boshqalar)
      • Maxsus: <code>/q #[heks rang kodi]</code> (masalan, <code>/q #cbafff</code>)
      • Tasodifiy: <code>/q random</code>
  • Media: Iqtiboslangan xabardan rasmlar/videolarni <code>/q m</code> yoki <code>/q media</code> bilan qo'shing
      • Media qirqish: Mediani qirqish uchun <code>/q c</code> yoki <code>/q crop</code> dan foydalaning.
  • Javoblarni saqlash: Javob olgan xabarni ko'rsatish uchun <code>/q r</code> yoki <code>/q reply</code>
  • Rasm Formati: Iqtiboslar uchun <code>/q i</code> yoki <code>/q img</code> yoki <code>/q p</code> yoki <code>/q png</code> (stikerlar o'rniga) foydalaning.

  💡 <b>Ajoyib Kombinatsiyalar</b>

  • Javoblar bilan oq iqtibos: <code>/q 3 white rp</code>
  • Yuqori sifatli qizil rasm: <code>/q i red s3.2</code>
  • Media va javoblar bilan iqtibos: <code>/q r 2 #cbafff m</code>

  ⚙️ <b>Ko'proq Variantlar</b>

  • Iqtiboslarni Baholash: <code>/q rate</code> (guruhda yoqilgan bo'lsa)
  • Tasodifiy Iqtibos: <code>/qrand</code> (guruhda yoqilgan bo'lsa)
  • Eng yuqori Iqtiboslar: <code>/qtop</code> (guruhda yoqilgan bo'lsa)
  • Tilni o'zgartirish: <code>/lang</code>

  🎯 <b>Guruh Admin Sozlamalari</b> (faqat guruh adminlari uchun)

  • Standart Rang: <code>/qcolor [rang]</code>
  • Baholashni Yoqish: <code>/qrate</code>
  • Stiker Paketiga Saqlash: <code>/qs [emoji]</code>
  • Stikerni O'chirish: <code>/qd</code> (stikerni javob bering)
  • Tasodifiy Iqtibos Tezligi: <code>/qgab [son]</code>
  • Emoji Suffixni O'zgartirish: <code>/qemoji</code> (stiker emojini o'zgartirish)
  • Emoji Uslubi:
      • Klassik: <code>/qb apple</code>, <code>/qb google</code>
      • Alt: <code>/qb twitter</code>, <code>/qb joypixels</code>
      • Retro: <code>/qb blob</code>

  📱 <b>Yordam Kerakmi?</b>

  • Blog: <a href="https://t.me/LyBlog">@LyBlog</a>
  • GitHub: <a href="https://github.com/LyoSU/quote-bot">github.com/LyoSU/quote-bot</a>
  • Qo'llab-quvvatlash: <code>/donate</code>
help_group: |
  <b>Salom! 👋</b>
  Men bu guruhda chiroyli sitatalar yarataman - vaqtincha biron-bir xabar bilan <code>/q</code> buyrug'idan foydalaning!

  Barcha xususiyatlarimni shaxsiyda bilib oling: <a href="t.me/${username}?start=help">Yordam Olish</a> ✨
btn:
  add_group: Guruhga qo'shish
  help: Ma'lumotnoma
quote:
  unsupported_message: |
    Ushbu xabar turi iqtibos uchun qo'llab-quvvatlanmaydi
  api_error: |
    <b>Oops! Nimadir xato ketdi 😅</b>
    <pre>${error}</pre>
    Iltimos, ozgina vaqt o'tgach yana urinib ko'ring!
  empty_forward: |
    Iltimos, sitata qilish uchun fikringizni yoki xabarni yuboring ✨
  set_background_color: |
    <b>Mukammal!</b> Sitataning fon rangi almashtirildi: <code>${backgroundColor}</code> 🎨
  set_emoji_brand: |
    <b>Tayyor!</b> Emoji uslubi almashtirildi: <code>${emojiBrand}</code> ✨
  errors:
    api_down: |
      😕 Bizning iqtiboslar xizmati vaqtincha mavjud emas. Bir necha daqiqadan so‘ng qayta urinib koʻring.

      Muammo davom etsa, @LyBlog'dagi yangilanishlarni tekshiring.
    rate_limit: |
      ⏳ Juda ko'p so'rovlar! Yangi iqtibos yaratishdan oldin ${seconds} soniya kuting.
    file_too_large: |
      📸 Media fayl juda katta (maksimal 5MB). Kichikroq rasm yoki video ishlatishga harakat qiling.
    invalid_format: |
      ❌ Qo'llab-quvvatlanmaydigan fayl formati. Men quyidagi formatlarni qo‘llab-quvvatlayman:
      • Rasmlar (JPG, PNG, WEBP)
      • Videolar (MP4)
      • Stikerlar
      • Matnli xabarlar
    telegram_error: |
      ⚠️ Telegram xatosi: ${error}

      Bu odatda quyidagi holatlarda sodir bo'ladi:
      • Fayl juda katta
      • Stiker to'plami to'la
      • Botda ruxsatlar yo'q
    generic_error: |
      😅 Voy! Nimadir xato ketdi:
      <code>${error}</code>

      Iltimos, qayta urining yoki muammo davom etsa, @Ly_oBot ga xabar bering.
    no_rights_send_documents: |
      🚫 <b>Ruxsat Xatosi</b>
      Bu chatda hujjatlarni jo'natish uchun men ruxsatim yo'q.

      <b>Buni tuzatish uchun:</b>
      • Guruh admini: Menga "Hujjatlarni jo'natish" ruxsatini bering
      • Xususiy chat: Botni bloklamaganingizni tekshiring
    no_rights_send_stickers: |
      🚫 <b>Ruxsat Xatosi</b>
      Bu chatda stikerlarni jo'natish uchun men ruxsatim yo'q.

      <b>Buni tuzatish uchun:</b>
      • Guruh admini: Menga "Stikerlarni jo'natish" ruxsatini bering
      • Buning o'rniga <code>/q img</code> ni sinab ko'ring
    no_rights_send_photos: |
      🚫 <b>Ruxsat Xatosi</b>
      Bu chatda fotosuratlarni jo'natish uchun men ruxsatim yo'q.

      <b>Buni tuzatish uchun:</b>
      • Guruh admini: Menga "Fotosuratlarni jo'natish" ruxsatini bering
      • Stiker formatida <code>/q</code> ni sinab ko'ring
    chat_write_forbidden: |
      🚫 <b>Chat Cheklangan</b>
      Bu chatda xabarlarni jo'nata olmayman.

      <b>Ehtimoliy sabablar:</b>
      • Siz botni bloklagansiz
      • Guruh botlarni cheklagan
      • Guruhdan chiqarildi
    sticker_set_invalid: |
      🔄 <b>Stiker Yigindisi Muammosi</b>
      Stiker yigindisi bilan muammo bor. Yangi iqtibos yaratilmoqda...
    sticker_set_full: |
      📦 <b>Stiker Yigindisi To'liq</b>
      Stiker yigindisi o'zining chegarasiga yetdi. Sizning iqtibosingiz oddiy stiker sifatida yuboriladi.
    bot_blocked: |
      🚫 <b>Bot Bloklangan</b>
      Siz ushbu botni bloklagansiz. Iqtiboslarni olish uchun uni ochib qo'ying.
    user_deactivated: |
      👤 <b>Hisob Muammosi</b>
      Ma'lum qilingan foydalanuvchi hisobi o'chirilgan yoki faol emas.
    message_too_long: |
      📝 <b>Xabar Juda Uzun</b>
      Harihat ketgan xabar juda uzun. Kamroq xabarlar yoki qisqaroq matnlarni harihat qilib ko'ring.
    network_error: |
      🌐 <b>Tarmoq Xatosi</b>
      Ulanish muammosi yuzaga keldi. Iltimos, birozdan so'ng yana urinib ko'ring.
    timeout_error: |
      ⏱️ <b>Vaqt Tugash Xatosi</b>
      So'rov juda uzoq vaqt oldi. Iltimos, yanada oddiy iqtibos bilan yana urinib ko'ring.
  image_to_quote:
    processing: |
      🔍 Rasmni tahlil qilinmoqda va matn olinmoqda...
    success: |
      ✅ ${count} xabardan iqtibos yaratildi!

      💡 <b>Maslahat:</b> Iqtiboslar yaratish uchun <code>/qi</code> yoki <code>/quote_image</code> sarlavhali skrinshotni yuboring
    errors:
      no_image: |
        ❌ Iltimos, rasm fayli yuboring (JPG, PNG, WebP)
      file_too_large: |
        ❌ Rasm juda katta. Maksimal o'lcham: 20MB
      unsupported_format: |
        ❌ Qo'llab-quvvatlanmaydigan rasm formati. Qo'llab-quvvatlanadiganlar: JPG, PNG, WebP
      no_text_found: |
        ❌ Rasmda o'qiladigan chat xabarlari topilmadi. Suhbat skrinshotining aniq ekanligiga ishonch hosil qiling.
      parse_error: |
