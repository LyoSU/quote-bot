language_name: '🇺🇦 Українська'
description:
  short: |
    Я допоможу створити цитату з повідомлення.
    Просто дайте відповідь на повідомлення за допомогою /q або перешліть мені повідомлення.
  long: |
    Помітили смішні чи надихаючі повідомлення у своєму груповому чаті, які б хотіли увічнити? Просто перешліть їх мені або введіть /q, і я перетворю їх на витончену наклейку з цитатою, яку ви зможете зберегти та поділитися з друзями. Незалежно від того, для особистих спогадів чи для професійного використання, можливості безмежні. Спробуй мене зараз! 😎
help: |2
  <b>Привіт!</b>
  Я допоможу створити цитату із поста.
  Бот може працювати як у особистих повідомленнях, так і груп.

    <b>⚙️ Доступні команди:</b>
  /q — зробити цитату із повідомлення <i>[відповісти на повідомлення]</i>

  Щоб створити цитату з кількох повідомлень, напишіть як параметр число, яке вказуватиме, скільки повідомлень має бути в цитаті.
  В особистих повідомленнях ви можете надіслати мені відразу кілька повідомлень і я зроблю з них цитату.

    <b>Доступні прапори для команди /q:</b>
      hex код або назва кольору: <code>#cbafff</code> або <code>indigo</code> — зробить цитату із кольором <b>#cbafff</b>
      <code>random</code> - випадковий колір цитати
      <code>reply</code> або <code>r</code> — зробити цитату із збереженням відповідей
      <code>p</code> або <code>png</code> — зробити цитату PNG
      <code>i</code> або <code>img</code> — зробити цитату картинкою
      <code>rate</code> — додати оцінку цитат
      <code>m</code> або <code>media</code> — увімкнути медіа
      <code>c</code> або <code>crop</code> — обрізати медіа
      <code>s2.5</code> — якість зображення в 2,5 рази вища за стандартне <i>(можна задати будь-яке значення)</i>

    <b>Приклад використання прапорів:</b>
    <code>/q 3 white rp</code>
    <code>/q i red s3.2</code>
    <code>/q r 2 #cbafff m</code>
    <code>/q 5 rm</code>

  Тільки для адміністраторів:
  <code>/qs 🥰💜</code> — зберігає стікер/фото/документ з фотографією в стікерпак групи з емодзи 🥰💜 <i>(будь-яка кількість емодзі)</i> <i>[відповісти на повідомлення]</i >
  <code>/qd</code> — видалити стікер із стикеру групи <i>[у відповідь на повідомлення]</i>
  <code>/qdrand</code> — remove the sticker from the group random stickers  <i>[in response to the message]</i>
  <code>/qb</code> — встановити бренд емодзі. Доступно: <code>apple</code>, <code>google</code>, <code>twitter</code>, <code>joypixels</code>, <code>blob</code>
  <code>/qcolor green</code> — встановити колір цитат <b>зелений</b> за замовчуванням <i>(hex код або назва кольору)</i>
  <code>/qemoji</code> — змінити суфікс емодзі для стікерів
  <code>/qrate</code> — увімкнути/вимкнути рейтинг цитат
  <code>/qgab 300</code> — встановити шанс випадкової появи цитата. Будь-яке число від одного від нескінченності. Чим вище число, тим нижчий шанс появи цитат. Вказавши 300, шанс появи повідомлення буде приблизно 1 раз на 300 повідомлень. Щоб вимкнути, встановіть значення на 0

  /qrand – випадкова цитата з позитивним рейтингом
  /qtop - найкращі цитати групи

  /help або /start - отримати цей текст

  🇺🇦 /lang - змінити мову

  <b>☕️ Купити каву розробнику:</b> donate.lyo.su

  <b>👨🏻‍💻 Блог розробника:</b> @LyBlog
  <b>GitHub:</b> github.com/LyoSU/quote-bot
