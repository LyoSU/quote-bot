adv:
  about: |
    <b>💫 Ви можете придбати рекламу в нас за велику кількість активних користувачів і груп</b>

    • Наш бот більш, ніж 30 "000 активних груп і більше ніж 70` 000 користувачів використовують бота щомісяця.
    Серед них є користувачі з різних країн. Ви можете вибрати мову користувачів, за якими має бути відображена реклама
    • Реклама відображається під цитатою у формі кнопки або текстового повідомлення, в залежності від чату користувача
    • Ви вказуєте ціну реклами самостійно; Перш за все, реклама, для якої буде доставлена найвища сума, буде відображатись
    • Текст і зміст реклами повинні відповідати нашим правилам (/adv_rules) і перед ним розміщенням Ви повинні пройти модерацію. Це можна зробити, перш ніж зробити депозит

    Баланс: ${balance} USD
  rules: |
    <b>У рекламі <u>заборонено</u></b>
    • Використання нецензурної ваги чи образи
    • Використання більше 1 емодзі в тексті
    • Оманлива інформація
    • Інформація, заборонена законодавством України
    • Контент для дорослих
    • Азартні ігри

    <i>Ми також маємо право відхилити рекламу, якщо вона нам просто не подобається без причини.</i>
  main_menu:
    create_btn: "Створити оголошення\nСтворити рекламу\nСтворити рекламний ролик"
    list_btn: Список оголошень
    pay_btn: Поповнити баланс
  create:
    enter_text: |
      Введіть текст оголошення:

      <i>Не більше 70 символів і має відповідати нашим правилам (/adv_rules)</i>
    enter_link: |
      Введіть посилання на рекламований ресурс:

      <i>Посилання має бути повним, якщо ви щось рекламуєте в Telegram, посилання має починатися з t.me.
      Ресурс повинен відповідати нашим правилам (/adv_rules), якщо після проходження модерації сайт буде замінено, ваш аккаунт буде заблоковано, а гроші не повернуті.</i>
    select_locale: |
      Виберіть мову користувачів, яким відображатиметься оголошення

      Число – це кількість користувачів, які потенційно побачать вашу рекламу цією мовою.
      Враховуються лише користувачі, які фактично використовують бота. Але рекламу можуть бачити й інші користувачі, які входять до групи, де була зроблена цитата, тому ця цифра може бути значно більшою

      <i>Мова не відповідає країні.
      Ви можете вибрати лише одну мову, якщо вам потрібно декілька, створіть оголошення ще раз іншою мовою.</i>
    enter_price: |
      Вкажіть ціну за 1000 показів вашої реклами в доларах США:

      <u>Середня ціна активних оголошень:</u> ${averagePrice} USD

      <i>Мінімальна ціна 0,15 USD.
      Оголошення відображаються випадковим чином, але найвищий шанс на показ мають оголошення, які мають вищу ціну за покази.
      </i>
    sent_moderate: |
      Оголошення відправлено на модерацію. Будь ласка, наберіться терпіння та зачекайте. Якщо модерація пройшла успішно або безуспішно, ви отримаєте сповіщення.
