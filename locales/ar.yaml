      لا يمكنني إرسال الرسائل في هذه الدردشة.

      <b>الأسباب المحتملة:</b>
      • لقد قمت بحظر البوت
      • المجموعة قيدت البوتات
      • لقد تمت إزالتي من المجموعة
    sticker_set_invalid: |
