        <code>/q random</code>

        <b>تدرج:</b>
        <code>/q red//blue</code>
    media:
      title: |
        <b>🖼 خيارات الوسائط</b>

        <b>تضمين الوسائط:</b>
        <code>/q m</code> أو <code>/q media</code>

        <b>قص الوسائط:</b>
        <code>/q c</code> أو <code>/q crop</code>

        <b>إظهار الردود:</b>
        <code>/q r</code> أو <code>/q reply</code>

        <b>كصورة:</b>
        <code>/q img</code> أو <code>/q png</code>
    group:
      title: |
        <b>👥 ميزات المجموعة</b>

        <b>للمسؤولين:</b>
        • <code>/qcolor blue</code> — اللون الافتراضي
        • <code>/qrate</code> — تفعيل التقييم
        • <code>/qs</code> — حفظ في حزمة الملصقات

        <b>للجميع:</b>
        • <code>/qtop</code> — أفضل الاقتباسات
        • <code>/qrand</code> — اقتباس عشوائي
