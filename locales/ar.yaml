      هناك مشكلة في حزمة الملصقات. يتم إنشاء اقتباس جديد...
    sticker_set_full: |
      📦 <b>حزمة الملصقات ممتلئة</b>
      وصلت حزمة الملصقات إلى الحد الأقصى. سيتم إرسال اقتباسك كملصق عادي.
    bot_blocked: |
