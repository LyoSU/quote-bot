    no_rights_send_photos: |
      🚫 <b>خطأ في الأذونات</b>
      ليس لدي إذن لإرسال الصور في هذه الدردشة.

      <b>لإصلاح هذا:</b>
      • مسؤول المجموعة: أعطني إذن "إرسال الصور"
