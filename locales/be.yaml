      emoji_style: "😊 Emoji Style"
      privacy: "🔒 Прыватнасць"
      back: "← Назад"
  features:
    title: |
      <b>✨ Што я магу?</b>
      Націсніце на магчымасць, каб даведацца больш:
    btn:
      basics: "📱 Асновы"
      colors: "🎨 Колеры і Стылі"
      media: "🖼 Медыя"
      group: "👥 Функцыі Групы"
    basics:
      title: |
        <b>📱 Базавае Цытаванне</b>

        <b>У групах:</b>
        Адкажыце на любое паведамленне з <code>/q</code>

        <b>У прыватным:</b>
        Перашліце паведамленні мне

        <b>Некалькі паведамленняў:</b>
        <code>/q 3</code> — адказанае паведамленне + 2 ніжэй
        <code>/q -3</code> — адказанае паведамленне + 2 вышэй
    colors:
      title: |
        <b>🎨 Колеры і Стылі</b>

        <b>Асноўныя колеры:</b>
        <code>/q red</code>, <code>/q blue</code>, <code>/q green</code>

        <b>Уласны колер:</b>
        <code>/q #ff69b4</code>

        <b>Выпадковы колер:</b>
        <code>/q random</code>

        <b>Градыент:</b>
        <code>/q red//blue</code>
    media:
      title: |
        <b>🖼 Параметры Медыя</b>

        <b>Дадаць медыя:</b>
        <code>/q m</code> або <code>/q media</code>

        <b>Абрэзаць медыя:</b>
        <code>/q c</code> або <code>/q crop</code>

        <b>Паказаць адказы:</b>
        <code>/q r</code> або <code>/q reply</code>

        <b>Як выява:</b>
        <code>/q img</code> або <code>/q png</code>
    group:
      title: |
        <b>👥 Функцыі Групы</b>

        <b>Для адмінаў:</b>
        • <code>/qcolor blue</code> — стандартны колер
        • <code>/qrate</code> — уключыць рэйтынг
        • <code>/qs</code> — захаваць у стыкерпак

        <b>Для ўсіх:</b>
        • <code>/qtop</code> — лепшыя цытаты
        • <code>/qrand</code> — выпадковая цытата
