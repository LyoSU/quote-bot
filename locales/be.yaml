language_name: '🇧🇾 Беларуская'
description:
  short: |
    I'll help create a quote from the message.
    Just reply to the message with /q or forward it to me.
  long: |
    Noticed any funny or inspiring messages in your group chat that you'd like to immortalize? Simply forward them to me or type /q and I'll turn them into a sleek quote sticker that you can save and share with your friends. Whether it's for personal memories or professional use, the possibilities are endless. Try me out now! 😎
help: |2
  <b>Прывітанне!</b>
  Я дапамагу стварыць цытату з паста.
  Бот можа працаваць як у прыватных паведамленнях, так і ў чатах.

    <b>⚙️ Даступныя каманды:</b>
  /q — Зрабіць цытату з паведамлення <i>[адказаць на паведамленне]</i>

  Каб стварыць цытату з некалькіх паведамленняў, напішыце як параметр колькасць паведамленняў для цытаты.
  У прыватных паведамленнях вы можаце проста прыслаць некалькі паведамленняў за раз, каб стварыць цытату з іх.

    <b>Магчымыя параметры каманды /q:</b>
      hex код або назва колеру: <code>#cbafff</code> або <code>indigo</code> — зрабіць цытату з колерам <b>#cbafff</b>
      <code>random</code> - выпадковы колер цытаты
      <code>reply</code> або <code>r</code> — паказваць адказы ў цытаце
      <code>p</code> або <code>png</code> — зрабіць цытату ў PNG
      <code>i</code> або <code>img</code> — зрабіць цытату як фота
      <code>rate</code> — дадаць адзнаку цытат
      <code>m</code> або <code>media</code> — уключыць медыя
      <code>c</code> або <code>crop</code> — абрэзаць медыя
      <code>s2.5</code> — якасць выявы будзе ў 2.5 разы вышэй за звычайную <i>(можна задаць любое значэнне)</i>

    <b>Прыклад выкарыстоўвання параметраў:</b>
    <code>/q 3 white rp</code>
    <code>/q i red s3.2</code>
    <code>/q r 2 #cbafff m</code>
    <code>/q 5 rm</code>

  Толькі для адміністратараў:
  <code>/qs 🥰💜</code> — захоўвае стыкер/фота/дакумент у набор стыкераў суполкі 🥰💜 <i>(любая колькасць эмодзі)</i> <i>[адказаць на паведамленне]</i >
  <code>/qd</code> — выдаліць стыкер з набору стыкераў суполкі <i>[адказаць на паведамленне]</i>
  <code>/qdrand</code> — remove the sticker from the group random stickers  <i>[in response to the message]</i>
  <code>/qb</code> — Наладзіць брэнд эмодзі. Даступна: <code>apple</code>, <code>google</code>, <code>twitter</code>, <code>joypixels</code>, <code>blob</code>
  <code>/qcolor green</code> — усталяваць колер цытат <b>зялёны</b> па змаўчанні <i>(hex код або назва колеру)</i>
  <code>/qemoji</code> — змяніць суфікс эмодзі для стыкераў
  <code>/qrate</code> — уключыць/выключыць рэйтынг цытат
  <code>/qgab 300</code> — усталяваць шанс для выпадковай цытаты. Любое станоўчае чысло. Чым больш чысло, тым меней шанс. Усталяваўшы 300, шанс з'яўлення будзе прыкладна 1 раз на 300 паведамленняў. Каб выключыць, змяніце значэнне на 0

  /qrand – выпадковая цытата са станоўчым рэйтынгам
  /qtop - топ цытат суполкі

  /help або /start - атрымаць гэты тэкст

  🇺🇸 /lang - змяніць мову

  <b>☕️ Купіць каву рсапрацоўніку:</b> donate.lyo.su

  <b>👨🏻‍💻 Блог распрацоўніка:</b> @LyBlog
  <b>GitHub:</b> github.com/LyoSU/quote-bot
