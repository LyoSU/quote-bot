# Coolify deployment compose for quote-bot (hetzner-auction) — grammy-rewrite.
# Builds the grammY bot (dist/index.js), the user-facing @QuotLyBot. Long-polling,
# no inbound webhook. Reaches quote-api via the host's published port. Uses
# external MongoDB + self-hosted Bot API (BOT_API_ROOT); no Redis/TDLib (those
# belong to the separate collector subsystem, not deployed here).
services:
  quote-bot:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QUOTE_API_URI=http://host.docker.internal:4888
      - QUOTE_API_URI_HTML=http://host.docker.internal:4889
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"   # METRICS_PORT
