# Coolify deployment compose for quote-bot (hetzner-auction).
# Long-polling bot (no inbound webhook). Reaches the quote-api container via the
# host's published port. TDLib logs in as a bot from BOT_TOKEN (fresh data
# volume — old 4.1 GB was regenerable cache). The updates-collector needs Redis;
# host redis binds 127.0.0.1 only and holds just non-critical counters/cache
# used solely by this bot, so a self-contained sidecar is used. Durable data is
# in external MongoDB.
services:
  quote-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QUOTE_API_URI=http://host.docker.internal:4888
      - QUOTE_API_URI_HTML=http://host.docker.internal:4889
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - quote-bot-tdlib:/app/helpers/tdlib/data
    depends_on:
      - redis
    ports:
      - "3000:3000"   # METRICS_PORT (Prometheus)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - quote-bot-redis:/data
volumes:
  quote-bot-tdlib:
  quote-bot-redis:
