# Coolify deployment compose for quote-bot (hetzner-auction).
# IMPORTANT: the repo's default CMD is the stats collector (updates-collector.js);
# the user-facing grammY bot is dist/index.js — run that here (matches the old
# PM2 "quote-bot" process). Long-polling, no inbound webhook. Reaches quote-api
# via the host's published port. TDLib logs in as a bot from BOT_TOKEN. Durable
# data is in external MongoDB; Redis is used for caching/the bot's internal needs.
services:
  quote-bot:
    build: .
    command: node dist/index.js
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QUOTE_API_URI=http://host.docker.internal:4888
      - QUOTE_API_URI_HTML=http://host.docker.internal:4889
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - quote-bot-tdlib:/app/helpers/tdlib/data
    depends_on:
      - redis
    ports:
      - "3000:3000"   # METRICS_PORT
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - quote-bot-redis:/data
volumes:
  quote-bot-tdlib:
  quote-bot-redis:
