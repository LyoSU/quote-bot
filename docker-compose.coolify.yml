# Coolify deployment compose for quote-bot (hetzner-auction) — grammy-rewrite.
# This branch's Dockerfile builds dist/ and runs the grammY bot (dist/index.js),
# the user-facing @QuotLyBot (the old PM2 "quote-bot"). Long-polling, no inbound
# webhook. Reaches the quote-api container via the host's published port. The bot
# uses external MongoDB + the self-hosted Bot API (BOT_API_ROOT); it does not use
# Redis or TDLib (those belong to the separate collector subsystem, not deployed).
services:
  quote-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - QUOTE_API_URI=http://host.docker.internal:4888
      - QUOTE_API_URI_HTML=http://host.docker.internal:4889
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"   # METRICS_PORT
